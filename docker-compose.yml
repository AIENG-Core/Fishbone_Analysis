services:

  # ── Ollama LLM server ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: fishbone-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── One-shot model pull (runs once, then exits) ────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: fishbone-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
        ollama pull gemma3:4b &&
        ollama pull phi3:mini
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ── FastAPI backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fishbone-api
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=gemma3:4b
    volumes:
      - app_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Streamlit frontend ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fishbone-app
    command:
      - streamlit
      - run
      - app.py
      - --server.port=8501
      - --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - app_data:/app/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  ollama_data:   # Ollama model weights (~2.5 GB gemma3:4b + ~2 GB phi3:mini)
  app_data:      # data/relevance.json — shared between api and app
  hf_cache:      # HuggingFace BAAI/bge-small-en-v1.5 model cache
